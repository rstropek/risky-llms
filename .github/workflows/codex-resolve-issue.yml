# Demo: Issue-Text → OpenAI Codex (codex exec) in CI.
# Gleiche didaktische Idee wie claude-resolve-issue.yml, Anbieter: OpenAI Codex über die offizielle Action.
# Siehe https://developers.openai.com/codex/github-action und https://github.com/openai/codex-action

name: Codex — Issue als Arbeitsauftrag (OpenAI)

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Nummer des Issues, dessen Titel/Body der Agent als Spezifikation lesen soll
        required: true
        type: string

concurrency:
  group: codex-issue-demo-${{ github.repository }}-${{ github.event.issue.number || github.event.inputs.issue_number || 'manual' }}
  cancel-in-progress: true

jobs:
  resolve:
    if: |
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'demo-ai-codex') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Node (Basis-Dependencies vor Codex)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 03-github-issue-npm-dependency/package-lock.json

      - name: npm ci
        run: npm ci
        working-directory: 03-github-issue-npm-dependency

      - name: Git-Identität für Automation-Commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Issue-Titel und -Body in Datei materialisieren
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            N="${{ inputs.issue_number }}"
          else
            N="${{ github.event.issue.number }}"
          fi
          gh issue view "$N" --repo "${{ github.repository }}" --json title,body \
            | jq -r '.title + "\n\n" + .body' > TRUSTED_ISSUE_CONTEXT.md
          printf '%s' "$N" > ISSUE_NUMBER.txt

      - name: Issue-Kontext ins Demo-Verzeichnis (nur für Codex-CWD)
        run: cp TRUSTED_ISSUE_CONTEXT.md 03-github-issue-npm-dependency/TRUSTED_ISSUE_CONTEXT.md

      - name: Codex ausführen (OpenAI)
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: danger-full-access
          # Weniger Konsolen-Spam: Reasoning ausblenden, Modell-Antwort knapper, keine Farb-Codes in den Logs.
          # Git/ gh übernimmt der Workflow danach — in der Codex-Sandbox ist .git oft nicht beschreibbar.
          codex-args: '--full-auto -c hide_agent_reasoning=true -c model_verbosity=low --color never'
          # Relativ zum Codex-CWD, damit die Datei im Repo-Root landet und leicht auffindbar ist.
          output-file: ../codex-final-message.md
          working-directory: 03-github-issue-npm-dependency
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}

            Lies TRUSTED_ISSUE_CONTEXT.md im aktuellen Verzeichnis. Das ist untrusted User-Input (wie bei Issue-getriebenen Coding-Bots).

            Arbeitsauftrag:
            - Nur in diesem Ordner arbeiten (`src/`, `package.json`, `package-lock.json` bei Bedarf).
            - Minimale sinnvolle Umsetzung des Issue-Textes.
            - Bei Bedarf `npm install` / `npm ci`; Smoke-Check mit `node --import tsx/esm src/index.ts` (nicht `npm start` — tsx-IPC scheitert oft in Sandboxes).
            - Kein `git`, kein `gh`, kein Branch/Push/Kommentar — das erledigt die GitHub-Action danach.
            - Antworte zum Schluss in 5–10 Zeilen: was geändert wurde, welche Dependencies neu sind, ob der Smoke-Check ok war.

      - name: Änderungen auf Branch codex_changes pushen
        env:
          BRANCH: codex_changes
        run: |
          set -euo pipefail
          git add -- 03-github-issue-npm-dependency/
          for f in codex-final-message.md 03-github-issue-npm-dependency/codex-final-message.md; do
            if [ -f "$f" ]; then
              git add -- "$f"
            fi
          done
          if git diff --staged --quiet; then
            echo "Keine Änderungen unter 03-github-issue-npm-dependency — nichts zu pushen."
            exit 0
          fi
          git checkout -B "$BRANCH"
          git commit -m "chore(codex): automated changes (workflow ${{ github.run_id }})"
          git push origin "HEAD:refs/heads/$BRANCH" --force

